server.port=3003
server.servlet.context-path=/api

spring.datasource.url=jdbc:postgresql://localhost:5433/skillbridge?currentSchema=orders&stringtype=unspecified
spring.datasource.username=skillbridge
spring.datasource.password=skillbridge123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=orders
spring.jpa.properties.hibernate.default_batch_fetch_size=20

spring.jackson.serialization.write-dates-as-timestamps=false

spring.sql.init.mode=always
